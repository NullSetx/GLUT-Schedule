# 教务系统配置
edu:
  username: "your_username_here"
  password: "your_password_here"
  base_url: "http://jw.glut.edu.cn"

# 钉钉机器人配置
dingtalk:
  # Stream 模式 (交互式机器人 + 定时推送)
  app_key: "your_app_key_here"
  app_secret: "your_app_secret_here"
  # 群聊 ID (openConversationId)，定时推送到指定群聊时需要
  # 获取方式：在钉钉群聊中 @机器人 发送任意消息，查看服务器日志中的 openConversationId
  chat_id: "your_chat_id_here"
  # 消息类型: "text" 或 "markdown"
  message_type: "markdown"

# 查询默认配置
defaults:
  date: null          # null 表示当天，也可写 "2026-5-18"
  send_to_dingtalk: false

# 定时推送配置
schedule:
  enabled: false
  # 推送时间 (24小时制)
  push_times:
    - "07:30"    # 早上推送当天课表
    - "21:00"    # 晚上推送明天课表
  # 推送日期类型: "today" 今天, "tomorrow" 明天
  push_type: "today"
